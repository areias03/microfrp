[workspace]
authors = ["areias03 <>"]
channels = ["conda-forge", "bioconda", "https://conda.anaconda.org/gurobi"]
name = "microfrp"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test = "cd workflow && snakemake -n"

[dependencies]
python = "==3.9"
gurobi = ">=12.0.3,<13"
snakemake = ">=7.32.4,<8"
polars = ">=1.33.1,<2"
cobra = ">=0.28.0,<1"

[pypi-dependencies]
micom = ">=0.37.1, <0.38"
cplex = "==22.1.1.0"
snakemake-executor-plugin-cluster-generic = ">=1.0.3, <2"
spirepy = { git = "https://github.com/BigDataBiology/SPIREpy.git" }
ipython = ">=8.18.1, <9"
